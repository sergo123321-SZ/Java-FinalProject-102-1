helpText=This application sorts collections. Version {0}. Created collaboratively by a 5-person team: {1}

option.exit.description=Exit the application immediately. If this option is present, any other options will be ignored.

option.model.description=Selects the model to work with. Required for almost all operations. Available options: {0}

option.reset.description=Clears the current model. Required options: {0}.

option.length.description=Prints the length of the selected model. Required options: {0}.

option.display.description=Prints the selected model. Required options: {0}.

option.create.description=Creates a new model. You must provide the size of the model to create. Required options: {0}.

option.sort.description=Sorts the selected model by a given rule. Available options:\n\
	 {0} - ascending\n\
	 {1} - descending\n\
	 {2} - special.\n\
Required options: {3}.

option.export.description=Exports data to a file. The file path must be provided as a parameter:\n\
	 Required options: {0}.

option.import.description=Imports data from a file. The file path must be provided as a parameter:\n\
	 Required options: {0}.

option.write-mode.description=Defines the data read/write mode for files and generator behavior.\n\
	 {0} - appends data to the collection/file (implicitly used if not specified)\n\
	 {1} - overwrites the file or collection (ALL data will be lost).

