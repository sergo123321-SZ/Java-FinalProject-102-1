helloText=This application sorts collections. Version {0}. Created collaboratively by a 5-person team: {1}\n\
          type --help for showing available commands


# ==============================================================================
# OPTION / COMMAND DESCRIPTIONS
# ==============================================================================

# --- System commands ---
option.help.description=Prints help for available commands and options.
option.exit.description=Exit the application immediately. \
                        If this option is present, any other options will be ignored.

option.language.description=Allows selecting the application interface language. \
                         Available options: en, ru.

# --- Data model operations ---
option.model.description=Selects the model to work with. Required for almost all operations. \
                         Available options: {0}

option.reset.description=Clears the current model. \
                          Required options: {0}.

option.length.description=Prints the length of the selected model. \
                          Required options: {0}.

option.display.description=Prints the selected model. \
                           Required options: {0}.

option.create.description=Creates a new model. You must provide the size of the model to create. \
                          Required options: {0}.

option.manual.description=Fills the selected model manually. You must provide number of records to input. \
                          Required options: {0}.


# --- Sorting ---
option.sort.description=Sorts the selected model by a given rule. Available options:\n\
                        \t {0} - ascending\n\
                        \t {1} - descending\n\
                        \t {2} - special.\n\
                        Required options: {3}.


# --- Import / export and file operations ---

option.export.description=Exports data to a file. The file path must be provided as a parameter:\n\
                          Required options: {0}.

option.import.description=Imports data from a file. The file path must be provided as a parameter:\n\
                          Required options: {0}.

option.write-mode.description=Defines the data read/write mode for files and generator behavior.\n\
                              \t {0} - appends data to the collection/file (always implicitly present if not specified)\n\
                              \t {1} - overwrites the file or collection (ALL data will be lost).


