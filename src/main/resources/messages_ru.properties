helpText=Это приложение для сортировки коллекций. Версия {0}. Создано совместными усилиями командой из 5 человек: {1}\n\
		   используйте --help для справки \n\
		   type --lang=EN to translate to English.


# ==============================================================================
# ОПИСАНИЕ ОПЦИЙ / КОМАНД
# ==============================================================================

# --- Системные команды ---
option.exit.description=Немедленный выход из приложения. \
						При наличии данного параметра, любые другие параметры будут проигнорированы.

option.language.description=Позволяет выбрать язык интерфейса приложения. \
						 Доступные варианты: en, ru.

# --- Работа с моделью данных ---
option.model.description=Позволяет выбрать модель для работы. Требуется практически для всех операций. \
						 Доступные варианты: {0}

option.reset.description=Очищает текущую модель. \
						  Обязательные опции: {0}.

option.length.description=Выводит на экран длину выбранной модели. \
						  Обязательные опции: {0}.

option.display.description=Выводит на экран выбранную модель. \
						   Обязательные опции: {0}.

option.create.description=Создает новую модель. Необходимо указать размер создаваемой модели. \
						  Обязательные опции: {0}.


# --- Сортировка ---
option.sort.description=Сортирует выбранную модель по заданному условию. Доступные варианты:\n\
						\t {0} - по возрастанию\n\
						\t {1} - по убыванию\n\
						\t {2} - специальная.\n\
						Обязательные опции: {3}.


# --- Импорт / экспорт и работа с файлами ---

option.export.description=Экспортирует данные в файл. В качестве параметра указывается путь к файлу:\n\
						  Обязательные опции: {0}.

option.import.description=Импортирует данные из файла. В качестве параметра указывается путь к файлу:\n\
						  Обязательные опции: {0}.

option.write-mode.description=Определяет режим чтения/записи данных в файл, поведение генератора.\n\
							  \t {0} - добавляет данные в коллекцию/файл (всегда неявно присутствует, если не указать)\n\
							  \t {1} - перезапишет файл или коллекцию (ВСЕ данные будут потеряны).


